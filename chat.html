<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aura Assistant — مساعد المتجر الذكي بالذكاء الاصطناعي" />
  <title>Aura Assistant — مساعدك الذكي</title>
  <link rel="stylesheet" href="chat.css" />
</head>
<body>
  <header class="c-header">
    <div class="c-header-inner">
      <a href="index.html" class="c-logo"><span class="c-mark">◈</span> Aura <span class="c-badge">Assistant</span></a>
      <a href="index.html" class="c-link">الرئيسية ←</a>
    </div>
  </header>

  <main class="c-main">
    <div class="c-chat" id="chat">
      <!-- الرسائل بتنحط هون -->
    </div>

    <div class="c-suggest" id="suggest">
      <button class="c-chip">كم سعر التوصيل؟</button>
      <button class="c-chip">متى يوصل طلبي؟</button>
      <button class="c-chip">في عندكم خصومات؟</button>
      <button class="c-chip">كيف أرجّع منتج؟</button>
    </div>

    <form class="c-input" id="form">
      <input type="text" id="msg" placeholder="اكتب رسالتك…" autocomplete="off" required />
      <button type="submit" id="send" aria-label="إرسال">➤</button>
    </form>
    <p class="c-note">
      💡 هالنسخة تجريبية بردود بسيطة. لتفعيل الذكاء الحقيقي (Claude)، شغّل
      الـ backend وغيّر <code>USE_API = true</code> بملف <code>chat.js</code>.
    </p>
  </main>

  <script src="chat.js"></script>
</body>
</html>
